<!DOCTYPE html>
<html lang="en">
<head>

        tailwind.config = {

    <!-- React & Tailwind Icons (Lucide) CDNs -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

            background-color: #090d16;

</head>
<body class="safe-top safe-bottom">

    <div id="root"></div>

    <script>
        const swTemplate = `
            const CACHE_NAME = 'four-bigs-cache-v5';
            const assetsToCache = [
                '/',
                '/index.html',
                'https://cdn.tailwindcss.com',
                'https://unpkg.com/react@18/umd/react.production.min.js',
                'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
                'https://unpkg.com/@babel/standalone/babel.min.js',
                'https://unpkg.com/lucide@latest'
            ];

            self.addEventListener('install', event => {
                event.waitUntil(
                    caches.open(CACHE_NAME).then(cache => {
                        return cache.addAll(assetsToCache);
                    }).then(() => self.skipWaiting())
                );
            });

            self.addEventListener('activate', event => {
                event.waitUntil(
                    caches.keys().then(keys => {
                        return Promise.all(
                            keys.map(key => {
                                if (key !== CACHE_NAME) {
                                    return caches.delete(key);
                                }
                            })
                        );
                    }).then(() => self.clients.claim())
                );
            });

            self.addEventListener('fetch', event => {
                event.respondWith(
                    caches.match(event.request).then(cachedResponse => {
                        if (cachedResponse) return cachedResponse;
                        return fetch(event.request);
                    })
                );
            });
        `;

        if ('serviceWorker' in navigator) {
            try {
                const swBlob = new Blob([swTemplate], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl)
                    .then(reg => console.log('PWA Service Worker registered successfully.'))
                    .catch(err => console.log('Service Worker registration skipped.'));
            } catch (e) {
                console.log('Skipping PWA direct SW Blob generation.');
            }
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STAKES = ['1/2', '1/3', '2/5', 'Other'];
        const TABLE_SIZES = [6, 8, 9, 10];
        const RANKS = ['A', 'K', 'Q', 'J', '10', '9', '8', '7', '6', '5', '4', '3', '2'];
        const SUITS = [
            { symbol: '♠', name: 'Spades', color: 'text-sky-400', bg: 'bg-sky-950/40 border-sky-800' },
            { symbol: '♥', name: 'Hearts', color: 'text-rose-500', bg: 'bg-rose-950/40 border-rose-800' },
            { symbol: '♦', name: 'Diamonds', color: 'text-pink-500', bg: 'bg-pink-950/40 border-pink-800' },
            { symbol: '♣', name: 'Clubs', color: 'text-emerald-400', bg: 'bg-emerald-950/40 border-emerald-800' }
        ];
        const ACTIONS = ['Fold', 'Limp', 'Call', 'Raise', '3-Bet', 'All-In'];
        const PROFILE_TAGS = ['Fish', 'Reg', 'Nit', 'LAG', 'Calling Station', 'Unknown'];
        const REVIEW_TAGS = ['Bluff', 'Bad Beat', 'Value Bet', 'Big Fold', 'Tilted', 'Premium Hand'];

        // Postflop sorting hierarchy weight (first to act to last to act)
        const POSTFLOP_WEIGHTS = {
            'SB': 1,
            'BB': 2,
            'UTG': 3,
            'UTG+1': 4,
            'UTG+2': 5,
            'MP1': 6,
            'MP2': 7,
            'MP': 8,
            'LJ': 9,
            'HJ': 10,
            'CO': 11,
            'BTN': 12
        };

        const getPostflopWeight = (pos) => POSTFLOP_WEIGHTS[pos] || 99;

        const playHaptic = (type = 'click') => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.05);
                } else if (type === 'success') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(320, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(640, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.15);
                } else if (type === 'card') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(450, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(250, ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.08);
                } else if (type === 'delete') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                }
            } catch (err) {
                // Audio blocked or not supported
            }
        };

        // Standard casino clockwise arrangement: Seat 1 is always UTG, with BB acting as the final dealer position
        const getPositionsForSize = (size) => {
            switch(Number(size)) {
                case 6: return ['UTG', 'MP', 'CO', 'BTN', 'SB', 'BB'];
                case 8: return ['UTG', 'UTG+1', 'MP', 'HJ', 'CO', 'BTN', 'SB', 'BB'];
                case 9: return ['UTG', 'UTG+1', 'MP', 'LJ', 'HJ', 'CO', 'BTN', 'SB', 'BB'];
                case 10: return ['UTG', 'UTG+1', 'UTG+2', 'MP1', 'MP2', 'HJ', 'CO', 'BTN', 'SB', 'BB'];
                default: return ['UTG', 'MP', 'CO', 'BTN', 'SB', 'BB'];
            }
        };

        function App() {
            const [step, setStep] = useState('HOME'); // HOME, START_SESSION, ACTIVE_SESSION, HAND_WIZARD
            const [pastSessions, setPastSessions] = useState([]);
            const [activeSession, setActiveSession] = useState(null);
            
            // Hand wizard states
            const [wizardStep, setWizardStep] = useState(3); // Starts at step 3 (Effective Stack)
            const [currentHand, setCurrentHand] = useState(null);
            const [selectedVillainIndex, setSelectedVillainIndex] = useState(0);

            // Modal & Install States
            const [showInstallPrompt, setShowInstallPrompt] = useState(false);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [showEndConfirm, setShowEndConfirm] = useState(false);

            // Load saved database on initialization
            useEffect(() => {
                const stored = localStorage.getItem('four_bigs_sessions');
                if (stored) {
                    try {
                        setPastSessions(JSON.parse(stored));
                    } catch (e) {
                        console.error("Corrupted local save schema resolved.");
                    }
                }

                const handleOnline = () => setIsOffline(false);
                const handleOffline = () => setIsOffline(true);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                const timer = setTimeout(() => {
                    const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                    if (!isPWA) {
                        setShowInstallPrompt(true);
                    }
                }, 3000);

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                    clearTimeout(timer);
                };
            }, []);

            const saveSessionsToStorage = (updated) => {
                localStorage.setItem('four_bigs_sessions', JSON.stringify(updated));
                setPastSessions(updated);
            };

            const handleStartSession = (setupData) => {
                playHaptic('success');
                const newSession = {
                    id: Date.now().toString(),
                    startTime: new Date().toISOString(),
                    stakes: setupData.stakes,
                    tableSize: Number(setupData.tableSize),
                    roomName: setupData.roomName || 'Unnamed Poker Room',
                    startingStack: setupData.startingStack || '100 BB',
                    hands: [],
                    netAmount: 0
                };
                setActiveSession(newSession);
                setStep('ACTIVE_SESSION');
            };

            const startNewHand = () => {
                playHaptic('click');
                setSelectedVillainIndex(0);
                setCurrentHand({
                    id: Date.now().toString(),
                    effectiveStack: '', // Hand-specific stack dynamics
                    heroPosition: '',
                    heroPositionIndex: null,
                    heroCards: [
                        { rank: '', suit: '' },
                        { rank: '', suit: '' }
                    ],
                    preflopAction: '',
                    preflopAmount: '',
                    villainCount: 1,
                    villains: [],
                    boardFlop: [
                        { rank: '', suit: '' },
                        { rank: '', suit: '' },
                        { rank: '', suit: '' }
                    ],
                    flopActions: [], // Live dynamic histories
                    boardTurn: { rank: '', suit: '' },
                    turnActions: [],
                    boardRiver: { rank: '', suit: '' },
                    riverActions: [],
                    result: '', // Won, Lost, Split
                    resultAmount: '',
                    notes: '',
                    tags: []
                });
                setWizardStep(3); // Start at Step 3 (Effective Stack)
                setStep('HAND_WIZARD');
            };

            const handleSaveHand = (handData) => {
                playHaptic('success');
                const updatedHands = [handData, ...activeSession.hands];
                
                // Calculate new net session amounts
                const netChange = Number(handData.resultAmount) || 0;
                let outcomeMultiplier = 1;
                if (handData.result === 'Lost') outcomeMultiplier = -1;
                else if (handData.result === 'Split') outcomeMultiplier = 0.5;

                const actualHandChange = netChange * outcomeMultiplier;
                const newNet = activeSession.netAmount + actualHandChange;

                setActiveSession({
                    ...activeSession,
                    hands: updatedHands,
                    netAmount: newNet
                });
                setStep('ACTIVE_SESSION');
            };

            const handleEndSession = () => {
                playHaptic('success');
                const finalizedSession = {
                    ...activeSession,
                    endTime: new Date().toISOString()
                };
                const updatedList = [finalizedSession, ...pastSessions];
                saveSessionsToStorage(updatedList);
                setActiveSession(null);
                setStep('HOME');
                setShowEndConfirm(false);
            };

            const handleDeleteSession = (id) => {
                playHaptic('delete');
                const filter = pastSessions.filter(s => s.id !== id);
                saveSessionsToStorage(filter);
            };

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-poker-bg border-x border-slate-900 shadow-2xl relative">
                    
                    {/* Header Matrix Navigation */}
                    <header className="sticky top-0 z-40 bg-poker-bg/95 backdrop-blur-md px-4 py-3 border-b border-slate-900/80 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 rounded-lg bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center">
                                <span className="font-extrabold text-poker-primary text-lg">4</span>
                            </div>
                            <div>
                                <h1 className="font-black text-sm tracking-wider uppercase bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">4 BIGS</h1>
                                <p className="text-[10px] text-slate-500 tracking-widest uppercase">Poker Log Studio</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            {isOffline ? (
                                <span className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs font-semibold">
                                    <span className="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span> Offline
                                </span>
                            ) : (
                                <span className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[10px] font-bold uppercase tracking-wider">
                                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> PWA Live
                                </span>
                            )}
                        </div>
                    </header>

                    {/* App Core Container Router */}
                    <main className="flex-1 overflow-y-auto pb-8">
                        {step === 'HOME' && (
                            <HomeView 
                                pastSessions={pastSessions} 
                                onStartClick={() => { playHaptic('click'); setStep('START_SESSION'); }} 
                                onDeleteSession={handleDeleteSession}
                            />
                        )}

                        {step === 'START_SESSION' && (
                            <StartSessionView 
                                onStart={handleStartSession} 
                                onCancel={() => { playHaptic('click'); setStep('HOME'); }} 
                            />
                        )}

                        {step === 'ACTIVE_SESSION' && (
                            <ActiveSessionView 
                                session={activeSession} 
                                onAddHand={startNewHand} 
                                onEndClick={() => { playHaptic('click'); setShowEndConfirm(true); }} 
                            />
                        )}

                        {step === 'HAND_WIZARD' && (
                            <HandWizard 
                                initialHand={currentHand}
                                tableSize={activeSession.tableSize}
                                getPositionsForSize={getPositionsForSize}
                                wizardStep={wizardStep}
                                setWizardStep={setWizardStep}
                                selectedVillainIndex={selectedVillainIndex}
                                setSelectedVillainIndex={setSelectedVillainIndex}
                                onSave={handleSaveHand}
                                onCancel={() => { playHaptic('click'); setStep('ACTIVE_SESSION'); }}
                            />
                        )}
                    </main>

                    {/* Floating PWA Install Prompt banner */}
                    {showInstallPrompt && (
                        <div className="fixed bottom-4 left-4 right-4 max-w-sm mx-auto bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-2xl z-50">
                            <div className="flex items-start gap-3">
                                <div className="w-10 h-10 rounded-xl bg-poker-primary/20 flex items-center justify-center text-poker-primary font-bold text-xl">4B</div>
                                <div className="flex-1">
                                    <h4 className="font-bold text-sm">Add 4 Bigs to Home Screen</h4>
                                    <p className="text-xs text-slate-400 mt-1">Install to log and review poker hands tableside seamlessly without cellular data.</p>
                                    <div className="flex gap-2 mt-3">
                                        <button 
                                            onClick={() => { playHaptic('success'); setShowInstallPrompt(false); }} 
                                            className="px-3 py-1.5 bg-poker-primary hover:bg-emerald-600 text-slate-950 rounded-lg text-xs font-bold"
                                        >
                                            Install App
                                        </button>
                                        <button 
                                            onClick={() => setShowInstallPrompt(false)} 
                                            className="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-semibold text-slate-300"
                                        >
                                            Later
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* End Session Confirmation Dialog */}
                    {showEndConfirm && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-900 border border-slate-800 p-6 rounded-3xl max-w-sm w-full shadow-2xl">
                                <h3 className="text-xl font-bold text-white mb-2">Finalize Live Session?</h3>
                                <p className="text-sm text-slate-400 mb-6">This will close the active tracking metrics, summarize your records, and archive the session locally.</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <button 
                                        onClick={() => setShowEndConfirm(false)} 
                                        className="py-3 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-xl font-semibold text-sm transition-all"
                                    >
                                        Go Back
                                    </button>
                                    <button 
                                        onClick={handleEndSession} 
                                        className="py-3 bg-rose-500 hover:bg-rose-600 text-white rounded-xl font-bold text-sm shadow-lg shadow-rose-500/20 transition-all"
                                    >
                                        End Session
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function HomeView({ pastSessions, onStartClick, onDeleteSession }) {
            const totalHands = pastSessions.reduce((acc, s) => acc + (s.hands ? s.hands.length : 0), 0);
            const overallProfit = pastSessions.reduce((acc, s) => acc + (s.netAmount || 0), 0);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [pastSessions]);

            return (
                <div className="px-4 pt-6 space-y-6">
                    {/* Welcome statistics panel */}
                    <div className="p-6 rounded-3xl bg-gradient-to-br from-slate-900 to-poker-card border border-slate-800/80 relative overflow-hidden shadow-xl">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-poker-primary/5 rounded-full blur-2xl"></div>
                        <h2 className="text-2xl font-black mb-1">Welcome back, Hero</h2>
                        <p className="text-xs text-slate-400">Tactical multi-street hand logger to audit and optimize game parameters.</p>
                        
                        <div className="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-slate-800/60">
                            <div>
                                <span className="text-[10px] text-slate-500 uppercase tracking-widest">Aggregate Profit</span>
                                <p className={`text-xl font-black tracking-tight ${overallProfit >= 0 ? 'text-poker-primary' : 'text-rose-500'}`}>
                                    {overallProfit >= 0 ? `+$${overallProfit}` : `-$${Math.abs(overallProfit)}`}
                                </p>
                            </div>
                            <div>
                                <span className="text-[10px] text-slate-500 uppercase tracking-widest">Logged Hands</span>
                                <p className="text-xl font-black text-slate-200">{totalHands}</p>
                            </div>
                        </div>
                    </div>

                    <button 
                        onClick={onStartClick}
                        className="w-full py-4 bg-poker-primary text-slate-950 font-black rounded-2xl flex items-center justify-center gap-2 tap-scale shadow-lg hover:bg-emerald-400 shadow-poker-primary/10 transition-all"
                    >
                        <i data-lucide="play" className="w-5 h-5 fill-current"></i>
                        START NEW SESSION
                    </button>

                    {/* Session Log Records History */}
                    <div className="space-y-3">
                        <div className="flex items-center justify-between px-1">
                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Historical Audit Logs</h3>
                            <span className="text-xs text-slate-500 font-medium">{pastSessions.length} logged</span>
                        </div>

                        {pastSessions.length === 0 ? (
                            <div className="p-8 rounded-2xl bg-poker-card/30 border border-slate-900/60 text-center space-y-2">
                                <i data-lucide="archive" className="w-8 h-8 text-slate-700 mx-auto"></i>
                                <p className="text-xs text-slate-500">No session history tracked yet. Tap start session above to begin logs.</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {pastSessions.map(session => {
                                    const dateStr = new Date(session.startTime).toLocaleDateString(undefined, {
                                        month: 'short',
                                        day: 'numeric',
                                        year: 'numeric'
                                    });
                                    return (
                                        <div key={session.id} className="p-4 rounded-2xl bg-poker-card border border-slate-900 hover:border-slate-800 transition-all space-y-3">
                                            <div className="flex items-start justify-between">
                                                <div>
                                                    <h4 className="font-bold text-sm text-white">{session.roomName}</h4>
                                                    <p className="text-[10px] text-slate-500 mt-0.5">{dateStr} · Stakes: {session.stakes} · {session.tableSize}-Max · Stack: {session.startingStack}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className={`px-2.5 py-1 rounded-lg text-xs font-extrabold ${session.netAmount >= 0 ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}`}>
                                                        {session.netAmount >= 0 ? `+$${session.netAmount}` : `-$${Math.abs(session.netAmount)}`}
                                                    </span>
                                                    <button 
                                                        onClick={() => onDeleteSession(session.id)}
                                                        className="p-1 hover:text-rose-500 text-slate-600 transition-colors"
                                                        title="Delete session log"
                                                    >
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            {/* Preview newest logged hand if present */}
                                            {session.hands && session.hands.length > 0 && (
                                                <div className="pt-2 border-t border-slate-800/40">
                                                    <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-1.5 font-semibold">Latest Hand</p>
                                                    <div className="flex items-center justify-between bg-slate-950/40 p-2 rounded-xl border border-slate-900/60 text-xs">
                                                        <div className="flex items-center gap-2">
                                                            <span className="text-slate-400 font-bold">{session.hands[0].heroPosition} {session.hands[0].effectiveStack ? `(${session.hands[0].effectiveStack})` : ''}</span>
                                                            <div className="flex gap-0.5 text-[10px]">
                                                                <span className="bg-slate-800 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                                                                    {session.hands[0].heroCards[0].rank}{session.hands[0].heroCards[0].suit}
                                                                </span>
                                                                <span className="bg-slate-800 text-white px-1.5 py-0.5 rounded font-mono font-bold">
                                                                    {session.hands[0].heroCards[1].rank}{session.hands[0].heroCards[1].suit}
                                                                </span>
                                                            </div>
                                                        </div>

        function HandWizard({ 
            initialHand, 
            tableSize, 
            getPositionsForSize, 
            wizardStep, 
            setWizardStep, 
            selectedVillainIndex,
            setSelectedVillainIndex,
            onSave, 
            onCancel 
        }) {
            const [hand, setHand] = useState(initialHand);
            
            // Dynamic Positional Betting State Machine for postflop streets
            const [streetState, setStreetState] = useState({
                street: 'flop', // 'flop', 'turn', 'river'
                players: [], // Active players sorted by weight
                history: [], // Strings of the action events
                currentActorIndex: 0,
                highestBet: 0, // Current chips level matching
                lastRaiserId: null,
                showBetSizes: false,
                currentActionPending: '' // 'Bet' or 'Raise' to show sizes first
            });

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [wizardStep, streetState.currentActorIndex, streetState.showBetSizes]);

            const positions = getPositionsForSize(tableSize);

            const updateHandState = (key, val) => {
                setHand(prev => ({
                    ...prev,
                    [key]: val
                }));
            };

            const goNext = () => {
                playHaptic('click');
                if (wizardStep === 4 && !hand.heroPosition) {
                    updateHandState('heroPosition', positions[0]);
                    updateHandState('heroPositionIndex', 0);
                }
                
                // If entering Flop actions (Step 13), Turn actions (Step 15), or River actions (Step 17)
                // Initialize the positional bidding states
                if (wizardStep === 12) {
                    initStreetState('flop');
                } else if (wizardStep === 14) {
                    initStreetState('turn');
                } else if (wizardStep === 16) {
                    initStreetState('river');
                }

                setWizardStep(prev => prev + 1);
            };

            const goPrev = () => {
                playHaptic('click');
                setWizardStep(prev => prev - 1);
            };

            const skipToOutcome = () => {
                playHaptic('success');
                setWizardStep(18); // Hand Outcome screen is now Step 18 due to Hero Card Split Screen
            };

            const initStreetState = (streetName) => {
                // Determine who is still active at the start of this street
                let roster = [];

                // 1. Hero
                const heroFoldedPreflop = hand.preflopAction === 'Fold';
                const heroFoldedFlop = streetName !== 'flop' && hand.flopFolded;
                const heroFoldedTurn = streetName === 'river' && hand.turnFolded;
                
                roster.push({
                    id: 'hero',
                    label: 'Hero',
                    position: hand.heroPosition,
                    isHero: true,
                    folded: heroFoldedPreflop || heroFoldedFlop || heroFoldedTurn,
                    contribution: 0,
                    lastAction: 'None',
                    actedThisRound: false
                });

                // 2. Villains
                hand.villains.forEach((v, idx) => {
                    const villainFoldedPreflop = v.action === 'Fold';
                    const villainFoldedFlop = streetName !== 'flop' && v.flopFolded;
                    const villainFoldedTurn = streetName === 'river' && v.turnFolded;

                    roster.push({
                        id: `villain_${idx}`,
                        label: `Villain ${idx + 1}`,
                        position: v.position || positions[(hand.heroPositionIndex + idx + 1) % tableSize],
                        isHero: false,
                        folded: villainFoldedPreflop || villainFoldedFlop || villainFoldedTurn,
                        contribution: 0,
                        lastAction: 'None',
                        actedThisRound: false
                    });
                });

                // Sort the active (non-folded) players by Postflop positional weight (closest to SB goes first)
                const activeOnStreet = roster.filter(p => !p.folded);
                const sortedActive = activeOnStreet.sort((a, b) => getPostflopWeight(a.position) - getPostflopWeight(b.position));

                setStreetState({
                    street: streetName,
                    players: sortedActive,
                    history: [],
                    currentActorIndex: 0,
                    highestBet: 0,
                    lastRaiserId: null,
                    showBetSizes: false,
                    currentActionPending: ''
                });
            };

            const handlePlayerAction = (actionType, sizing = '') => {
                const currentActor = streetState.players[streetState.currentActorIndex];
                const updatedPlayers = streetState.players.map((p, idx) => {
                    if (idx === streetState.currentActorIndex) {
                        let finalContribution = p.contribution;
                        let lastAct = actionType;
                        
                        if (actionType === 'Check') {
                            lastAct = 'Check';
                        } else if (actionType === 'Bet') {
                            lastAct = 'Bet';
                            finalContribution = 1; // Simple bet index matching
                        } else if (actionType === 'Call') {
                            lastAct = 'Call';
                            finalContribution = streetState.highestBet;
                        } else if (actionType === 'Raise') {
                            lastAct = 'Raise';
                            finalContribution = streetState.highestBet + 1;
                        }

                        return {
                            ...p,
                            lastAction: lastAct,
                            contribution: finalContribution,
                            actedThisRound: true,
                            folded: actionType === 'Fold' ? true : p.folded
                        };
                    }
                    return p;
                });

                // Compute overall histories & action details
                let actionText = `${currentActor.label} (${currentActor.position}) ${actionType}`;
                if (sizing) {
                    actionText += ` [${sizing}]`;
                }
                const updatedHistory = [...streetState.history, actionText];

                // Calculate updated state limits
                let nextHighestBet = streetState.highestBet;
                let nextLastRaiserId = streetState.lastRaiserId;

                if (actionType === 'Bet') {
                    nextHighestBet = 1;
                    nextLastRaiserId = currentActor.id;
                } else if (actionType === 'Raise') {
                    nextHighestBet = streetState.highestBet + 1;
                    nextLastRaiserId = currentActor.id;
                } else if (actionType === 'Fold') {
                    // Update main hand fold configurations globally
                    if (currentActor.isHero) {
                        setHand(prev => ({ ...prev, [`${streetState.street}Folded`]: true }));
                    } else {
                        const vIndex = parseInt(currentActor.id.replace('villain_', ''));
                        const updatedVillains = [...hand.villains];
                        updatedVillains[vIndex][`${streetState.street}Folded`] = true;
                        setHand(prev => ({ ...prev, villains: updatedVillains }));
                    }
                }

                // Check remaining active players who are not folded
                const activeRemaining = updatedPlayers.filter(p => !p.folded);

                // Early check: if only 1 player remains in the hand, skip directly to the Outcomes result screen (Step 18)
                if (activeRemaining.length <= 1) {
                    playHaptic('success');
                    setHand(prev => ({
                        ...prev,
                        [`${streetState.street}Actions`]: updatedHistory
                    }));
                    setTimeout(() => {
                        setWizardStep(18); // Outcomes step (was 17)
                    }, 400);
                    return;
                }

                // Find next actor's index
                let nextIdx = (streetState.currentActorIndex + 1) % updatedPlayers.length;
                while (updatedPlayers[nextIdx].folded) {
                    nextIdx = (nextIdx + 1) % updatedPlayers.length;
                }

                // Determine if betting round is fully satisfied:
                let roundComplete = false;

                if (nextHighestBet === 0) {
                    // Unopened street: satisfied if everyone active has checked once
                    const allActed = updatedPlayers.filter(p => !p.folded).every(p => p.actedThisRound);
                    if (allActed) {
                        roundComplete = true;
                    }
                } else {
                    // Opened street: satisfied if the next actor's contribution matches the highest bet and they have already acted
                    const nextActor = updatedPlayers[nextIdx];
                    if (nextActor.contribution === nextHighestBet && nextActor.actedThisRound) {
                        roundComplete = true;
                    }
                }

                if (roundComplete) {
                    playHaptic('success');
                    // Save actions log directly to the hand state
                    const savedHand = {
                        ...hand,
                        [`${streetState.street}Actions`]: updatedHistory
                    };
                    setHand(savedHand);

                    // Move to next stage step in order
                    setTimeout(() => {
                        if (streetState.street === 'flop') {
                            setWizardStep(14); // Turn Board Card Setup (was 13)
                        } else if (streetState.street === 'turn') {
                            setWizardStep(16); // River Board Card Setup (was 15)
                        } else if (streetState.street === 'river') {
                            setWizardStep(18); // Outcomes screen (was 17)
                        }
                    }, 400);
                } else {
                    // Continue the active betting street round
                    setStreetState(prev => ({
                        ...prev,
                        players: updatedPlayers,
                        history: updatedHistory,
                        currentActorIndex: nextIdx,
                        highestBet: nextHighestBet,
                        lastRaiserId: nextLastRaiserId,
                        showBetSizes: false,
                        currentActionPending: ''
                    }));
                }
            };

            const getStepTitle = (s) => {
                switch(s) {
                    case 3: return "Step 3: Effective Stack";
                    case 4: return "Step 4: Your Position";
                    case 5: return "Step 5: Hero Card 1";
                    case 6: return "Step 6: Hero Card 2";
                    case 7: return "Step 7: Preflop Action";
                    case 8: return "Step 8: Villain Count";
                    case 9: return `Step 9: Villain Profile (${selectedVillainIndex + 1}/${hand.villainCount})`;
                    case 10: return "Step 10: Flop Card 1";
                    case 11: return "Step 11: Flop Card 2";
                    case 12: return "Step 12: Flop Card 3";
                    case 13: return "Step 13: Flop Live Action";
                    case 14: return "Step 14: Turn Board Card";
                    case 15: return "Step 15: Turn Live Action";
                    case 16: return "Step 16: River Board Card";
                    case 17: return "Step 17: River Live Action";
                    case 18: return "Step 18: Hand Outcome";
                    case 19: return "Step 19: Notes & Analysis";
                    default: return "Configure Hand";
                }
            };

            const handleHeroCardInput = (cardIdx, key, val) => {
                playHaptic('card');
                const updatedCards = [...hand.heroCards];
                updatedCards[cardIdx] = { ...updatedCards[cardIdx], [key]: val };
                
                setHand(prev => {
                    const next = { ...prev, heroCards: updatedCards };
                    const isCompleted = next.heroCards[cardIdx].rank && next.heroCards[cardIdx].suit;
                    if (isCompleted) {
                        setTimeout(() => {
                            setWizardStep(prevStep => prevStep + 1);
                        }, 250);
                    }
                    return next;
                });
            };

            const handleFlopCardInput = (cardIdx, key, val) => {
                playHaptic('card');
                const updatedFlop = [...hand.boardFlop];
                updatedFlop[cardIdx] = { ...updatedFlop[cardIdx], [key]: val };
                
                setHand(prev => {
                    const next = { ...prev, boardFlop: updatedFlop };
                    const isCompleted = next.boardFlop[cardIdx].rank && next.boardFlop[cardIdx].suit;
                    if (isCompleted) {
                        setTimeout(() => {
                            if (cardIdx === 2) {
                                initStreetState('flop');
                            }
                            setWizardStep(prevStep => prevStep + 1);
                        }, 250);
                    }
                    return next;
                });
            };

            const handleTurnCardInput = (key, val) => {
                playHaptic('card');
                const updatedTurn = { ...hand.boardTurn, [key]: val };
                
                setHand(prev => {
                    const next = { ...prev, boardTurn: updatedTurn };
                    if (next.boardTurn.rank && next.boardTurn.suit) {
                        setTimeout(() => {
                            initStreetState('turn');
                            setWizardStep(15); // Turn Live Action (was 14)
                        }, 250);
                    }
                    return next;
                });
            };

            const handleRiverCardInput = (key, val) => {
                playHaptic('card');
                const updatedRiver = { ...hand.boardRiver, [key]: val };
                
                setHand(prev => {

                                            type="button"
                                            onClick={() => {
                                                playHaptic('click');
                                                handlePlayerAction('Check');
                                            }}
                                            className="py-3 bg-slate-900 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 text-slate-200 rounded-xl font-bold text-sm transition-all shadow-md"
                                        >
                                            Check
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => {
                                                playHaptic('click');
                                                setStreetState(prev => ({
                                                    ...prev,
                                                    showBetSizes: true,
                                                    currentActionPending: 'Bet'
                                                }));
                                            }}
                                            className="py-3 bg-poker-primary hover:bg-emerald-400 text-slate-950 rounded-xl font-black text-sm transition-all shadow-md glow-green"
                                        >
                                            Bet
                                        </button>
                                    </>
                                ) : (
                                    <>
                                        {/* Facing bet/raise Options */}
                                        <button
                                            type="button"
                                            onClick={() => {
                                                playHaptic('click');
                                                handlePlayerAction('Fold');
                                            }}
                                            className="py-3 bg-rose-950/40 border border-rose-900/60 hover:bg-rose-900/20 text-rose-400 rounded-xl font-bold text-sm transition-all"
                                        >
                                            Fold
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => {
                                                playHaptic('click');
                                                handlePlayerAction('Call');
                                            }}
                                            className="py-3 bg-sky-950/40 border border-sky-900/60 hover:bg-sky-900/20 text-sky-400 rounded-xl font-extrabold text-sm transition-all"
                                        >
                                            Call
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => {
                                                playHaptic('click');
                                                setStreetState(prev => ({
                                                    ...prev,
                                                    showBetSizes: true,
                                                    currentActionPending: 'Raise'
                                                }));
                                            }}
                                            className="py-3 col-span-2 bg-poker-accent text-slate-950 rounded-xl font-black text-sm transition-all shadow-md glow-gold"
                                        >
                                            Raise
                                        </button>
                                    </>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-3 p-3 rounded-2xl bg-slate-950 border border-slate-900 animate-fadeIn">
                                <div className="flex items-center justify-between">
                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">
                                        Select {streetState.currentActionPending} Size
                                    </span>
                                    <button
                                        type="button"
                                        onClick={() => setStreetState(prev => ({ ...prev, showBetSizes: false, currentActionPending: '' }))}
                                        className="text-[10px] text-rose-400 font-bold uppercase"
                                    >
                                        Cancel
                                    </button>
                                </div>

                                <div className="grid grid-cols-4 gap-1.5">
                                    {(streetState.currentActionPending === 'Bet' ? BET_SIZINGS : RAISE_SIZINGS).map(sz => (
                                        <button
                                            key={sz}
                                            type="button"
                                            onClick={() => {
                                                if (sz !== 'custom') {
                                                    playHaptic('success');
                                                    handlePlayerAction(streetState.currentActionPending, sz);
                                                } else {
                                                    setStreetState(prev => ({ ...prev, currentActionPendingCustom: true }));
                                                }
                                            }}
                                            className="py-2.5 bg-slate-900 border border-slate-800 text-slate-300 rounded-xl text-xs font-bold hover:bg-slate-800 hover:border-slate-700 transition-all"
                                        >
                                            {sz}
                                        </button>
                                    ))}
                                </div>

                                {streetState.currentActionPendingCustom && (
                                    <div className="flex gap-2 pt-1 animate-fadeIn">
                                        <input
                                            type="text"
                                            placeholder="Custom amount (e.g. 15 BB)"
                                            id="customSizingInput"
                                            className="flex-1 p-3 rounded-xl bg-slate-900 border border-slate-900 focus:border-poker-primary text-white text-xs focus:outline-none"
                                        />
                                        <button
                                            type="button"
                                            onClick={() => {
                                                const el = document.getElementById('customSizingInput');
                                                if (el && el.value) {
                                                    playHaptic('success');
                                                    handlePlayerAction(streetState.currentActionPending, el.value);
                                                }
                                            }}
                                            className="px-4 bg-poker-primary text-slate-950 rounded-xl font-bold text-xs"
                                        >
                                            Confirm
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Street History Timeline Logs */}
                    <div className="bg-slate-950/50 p-3 rounded-2xl border border-slate-900 space-y-2">
                        <span className="text-[9px] text-slate-500 font-black uppercase tracking-wider block">
                            Action Logs Timeline
                        </span>
                        
                        {streetState.history.length === 0 ? (
                            <p className="text-[10px] text-slate-600 italic">No actions logged yet. First actor to speak is {currentActor.label} ({currentActor.position}).</p>
                        ) : (
                            <div className="space-y-1.5 max-h-24 overflow-y-auto font-mono text-[10px]">
                                {streetState.history.map((act, idx) => (
                                    <div key={idx} className="text-slate-300 flex items-center gap-1.5">
                                        <span className="text-slate-600">[{idx+1}]</span>
                                        <span>{act}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <button 
                        type="button"
                        onClick={skipToOutcome}
                        className="w-full py-2 bg-slate-900 hover:bg-slate-850 text-[10px] text-slate-500 hover:text-slate-300 font-bold uppercase tracking-widest rounded-xl transition-all"
                    >
                        Skip Directly to outcome
                    </button>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
